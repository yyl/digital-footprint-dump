name: Monthly Pipeline

on:
  schedule:
    # Run on the last day of each month at 11:00 AM UTC
    # Cron doesn't support "last day", so we run on the 28th-31st and check the date
    - cron: '0 11 28-31 * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        required: true
        default: 'publish'
        type: choice
        options:
          - sync
          - analyze
          - publish
          - backfill
          - publish --dry-run
      last_month:
        description: 'Publish for the last month instead of the latest (for manual runs)'
        required: false
        default: false
        type: boolean

env:
  DATA_REPO_OWNER: ${{ secrets.DATA_REPO_OWNER }}
  DATA_REPO_NAME: ${{ secrets.DATA_REPO_NAME }}

jobs:
  check-date:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if last day of month
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Not a scheduled run, proceeding..."
            exit 0
          fi

          tomorrow=$(date -d "+1 day" +%d)
          if [ "$tomorrow" != "01" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not the last day of the month, skipping..."
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "Today is the last day of the month, proceeding..."

  pipeline:
    needs: check-date
    if: ${{ needs.check-date.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code repository
        uses: actions/checkout@v6

      - name: Checkout data repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.DATA_REPO_OWNER }}/${{ env.DATA_REPO_NAME }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: _data_repo
          lfs: true

      - name: Setup data directories
        run: |
          # Create directories if they don't exist
          mkdir -p _data_repo/data
          mkdir -p _data_repo/files
          
          # Symlink data and files directories
          ln -sf $(pwd)/_data_repo/data $(pwd)/data
          ln -sf $(pwd)/_data_repo/files $(pwd)/files

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install $(cat .python-version)

      - name: Install dependencies
        run: uv sync --python $(cat .python-version)

      - name: Run pipeline
        env:
          READWISE_ACCESS_TOKEN: ${{ secrets.READWISE_ACCESS_TOKEN }}
          FOURSQUARE_ACCESS_TOKEN: ${{ secrets.FOURSQUARE_ACCESS_TOKEN }}
          FOURSQUARE_API_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
          HARDCOVER_ACCESS_TOKEN: ${{ secrets.HARDCOVER_ACCESS_TOKEN }}
          BLOG_GITHUB_TOKEN: ${{ secrets.BLOG_GITHUB_TOKEN }}
          BLOG_REPO_OWNER: ${{ secrets.BLOG_REPO_OWNER }}
          BLOG_REPO_NAME: ${{ secrets.BLOG_REPO_NAME }}
          BLOG_GITHUB_TARGET_BRANCH: ${{ secrets.BLOG_GITHUB_TARGET_BRANCH }}
          CODEBASE_USERNAME: ${{ secrets.CODEBASE_USERNAME }}
        run: |
          COMMAND="${{ inputs.command }}"
          # For scheduled runs, run both publish and backfill
          if [ -z "$COMMAND" ]; then
            echo "Running: uv run main.py publish"
            uv run --python $(cat .python-version) main.py publish
            echo ""
            echo "Running: uv run main.py backfill"
            uv run --python $(cat .python-version) main.py backfill
          else
            LAST_MONTH_FLAG=""
            if [ "${{ inputs.last_month }}" == "true" ]; then
              LAST_MONTH_FLAG="--last-month"
            fi
            
            if [[ "$COMMAND" == publish* ]]; then
              echo "Running: uv run main.py $COMMAND $LAST_MONTH_FLAG"
              uv run --python $(cat .python-version) main.py $COMMAND $LAST_MONTH_FLAG
            else
              echo "Running: uv run main.py $COMMAND"
              uv run --python $(cat .python-version) main.py $COMMAND
            fi
          fi

      - name: Commit updated databases
        run: |
          COMMAND="${{ inputs.command }}"
          if [ "$COMMAND" = "publish --dry-run" ]; then
            echo "Dry run mode - skipping database commit"
            exit 0
          fi
          
          cd _data_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add any changed database files
          git add data/*.db 2>/dev/null || true
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "Update databases [automated]"
            git push
            echo "Databases updated successfully"
          fi
